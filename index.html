<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to My Cloud Project</title>
    <style>
        :root {
            --primary-blue: #00d2ff;
            --secondary-purple: #9d50bb;
            --dark-bg: #0f172a;
            --text-gray: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Animated Background Gradient */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            z-index: -1;
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .container {
            text-align: center;
            animation: fadeIn 1.5s ease-out;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .devops-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: float 4s ease-in-out infinite;
            display: inline-block;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(to right, var(--primary-blue), var(--secondary-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .college-name {
            font-size: 1.8rem;
            color: #f8fafc;
            margin-top: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .course-name {
            font-size: 1.2rem;
            color: var(--primary-blue);
            font-style: italic;
            margin-bottom: 30px;
        }

        /* Tech Tags (DevOps/Cloud Stuff) */
        .tech-stack {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .tag {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid var(--primary-blue);
            color: var(--primary-blue);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-family: monospace;
            transition: 0.3s;
        }

        .tag:hover {
            background: var(--primary-blue);
            color: var(--dark-bg);
            cursor: default;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="container">
        <div class="devops-icon">☁️ ⚙️ 🚀</div>
        <h1>Welcome to My Project</h1>
        <div class="college-name">Governor State University</div>
        <div class="course-name">Cloud Integrity Assurance</div>
        
        <div class="tech-stack">
            <span class="tag">#AWS</span>
            <span class="tag">#DevOps</span>
            <span class="tag">#CICD</span>
            <span class="tag">#CloudShell</span>
            <span class="tag">#ElasticBeanstalk</span>
            <span class="tag">#Terraform</span>
        </div>
    </div>
</body>
</html>
